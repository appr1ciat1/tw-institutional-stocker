name: Update TW Institutional Data

on:
  schedule:
    # 每個交易日（週一～週五）台北時間 18:00 執行。
    # 台北 = UTC+8，故 18:00 Taipei = 10:00 UTC。收盤後法人/外資資料約 16:30 已公布。
    - cron: "0 10 * * 1-5"  # 10:00 UTC = 18:00 Taipei, Mon-Fri
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run update_all.py
        run: |
          python update_all.py

      - name: Build latest three-inst snapshot
        run: |
          python build_stock_three_inst_latest.py

      - name: Run update_broker.py
        run: |
          python update_broker.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs/data
          if ! git diff --cached --quiet; then
            git commit -m "chore: update data ($(date -u '+%Y-%m-%d'))"
            # 一般 commit + push（不再 --amend / --force，避免被分支保護擋下導致資料不更新）
            git pull --rebase --autostash origin main || true
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi

